<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NovelFlow Reader — Immersive EPUB Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- Inspired by novelfire.to: dark, cozy, reading-centric ----- */
        body {
            background: #0F0E12;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* custom scrollbar for reader */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1E1C24;
        }
        ::-webkit-scrollbar-thumb {
            background: #3A3A44;
            border-radius: 10px;
        }

        /* main app grid */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #0F0E12;
        }

        /* ----- header (minimal, floating style) ----- */
        .reader-header {
            background: rgba(18, 17, 23, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #E9D8A6, #C3B18D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* novelfire style buttons */
        .btn {
            background: rgba(30, 28, 36, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #F0EDE5;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .btn-primary {
            background: #C9A96E;
            border-color: #E9CDA0;
            color: #0F0E12;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(201, 169, 110, 0.2);
        }

        .btn-primary:hover {
            background: #D9B87A;
            transform: translateY(-1px);
        }

        .btn:hover {
            background: #2A2832;
            border-color: rgba(255, 215, 150, 0.3);
        }

        /* theme pills */
        .theme-pills {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 48px;
            padding: 4px;
        }
        .theme-option {
            background: transparent;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #B9B5C2;
            cursor: pointer;
            transition: 0.2s;
        }
        .theme-option.active {
            background: #C9A96E;
            color: #0F0E12;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* font size select */
        .font-selector {
            background: #1E1C24;
            border: 1px solid #2F2C38;
            border-radius: 32px;
            padding: 6px 12px;
            color: #F0EDE5;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* progress / chapter floating indicator */
        .reading-stats {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 5px 14px;
            font-size: 0.75rem;
            color: #D9D2C0;
        }

        /* main reader pane - immersive */
        .reader-pane {
            flex: 1;
            overflow-y: auto;
            position: relative;
            background: #17161C;
            transition: background 0.2s, color 0.2s;
        }

        /* content wrapper with max-width like novel site */
        .epub-viewer {
            max-width: 860px;
            margin: 2rem auto;
            padding: 1.5rem 2rem;
            background: #FCF9F2;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.3);
            transition: all 0.2s;
            min-height: 85vh;
        }

        /* dark theme for viewer */
        .reader-pane.dark .epub-viewer {
            background: #1E1C26;
            color: #E2E0E8;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .reader-pane.sepia .epub-viewer {
            background: #FCF2E1;
            color: #4A3729;
        }
        .reader-pane.light .epub-viewer {
            background: #FFFFFF;
            color: #2C2A2E;
        }

        /* actual epub content styling */
        .epub-rendition-area {
            width: 100%;
            font-family: 'Crimson Pro', 'Georgia', serif;
            line-height: 1.7;
            font-size: 1.05rem;
        }
        
        .epub-rendition-area img {
            max-width: 100%;
            border-radius: 12px;
            margin: 1.5rem 0;
        }
        
        .epub-rendition-area p {
            margin-bottom: 1.25rem;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem;
            color: #A9A3B5;
            gap: 1rem;
        }
        
        .empty-state-icon {
            font-size: 5rem;
            opacity: 0.5;
        }
        
        /* bottom navigation - clean, minimal */
        .nav-footer {
            background: rgba(15, 14, 18, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 12px 24px;
            display: flex;
            justify-content: center;
            gap: 28px;
            align-items: center;
            z-index: 10;
        }
        
        .nav-btn {
            background: rgba(40, 38, 48, 0.8);
            border: none;
            padding: 10px 26px;
            border-radius: 44px;
            color: #EFE9DC;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        
        .nav-btn:hover {
            background: #C9A96E;
            color: #0F0E12;
            transform: scale(0.97);
        }
        
        .chapter-indicator {
            background: #26232C;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #D9C89E;
            min-width: 160px;
            text-align: center;
        }
        
        /* loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(201,169,110,0.3);
            border-radius: 50%;
            border-top-color: #C9A96E;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* responsive */
        @media (max-width: 700px) {
            .reader-header {
                flex-direction: column;
                align-items: stretch;
            }
            .epub-viewer {
                padding: 1.2rem;
                margin: 1rem;
            }
            .nav-btn {
                padding: 6px 18px;
            }
        }
        
        /* utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="reader-header">
        <div class="logo-area">
            <span class="logo-icon">📖</span>
            <span class="logo-text">NovelFlow</span>
        </div>
        <div class="controls">
            <label class="btn btn-primary" id="uploadLabel">
                📂 Upload EPUB
                <input type="file" id="epubFileInput" accept=".epub" style="display: none;">
            </label>
            <div class="theme-pills">
                <button data-theme="light" class="theme-option active">☀️ Day</button>
                <button data-theme="sepia" class="theme-option">🕯️ Sepia</button>
                <button data-theme="dark" class="theme-option">🌙 Night</button>
            </div>
            <select id="fontSizeControl" class="font-selector">
                <option value="0.85">Small</option>
                <option value="1" selected>Medium</option>
                <option value="1.2">Large</option>
                <option value="1.4">X-Large</option>
            </select>
            <div class="reading-stats" id="statsPreview">
                📍 Not opened
            </div>
        </div>
    </div>

    <div class="reader-pane" id="readerPane">
        <div id="epubContainer" class="epub-viewer">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📘✨</div>
                <h3>Begin your journey</h3>
                <p>Upload an EPUB file to start reading in a beautiful, distraction-free interface.</p>
                <button id="fakeUploadBtn" class="btn btn-primary" style="margin-top: 1rem;">Select EPUB</button>
            </div>
            <div id="renditionRoot" class="epub-rendition-area" style="min-height: 450px;"></div>
        </div>
    </div>

    <div class="nav-footer" id="navFooter" style="display: none;">
        <button class="nav-btn" id="prevChapterBtn">◀ Previous</button>
        <div class="chapter-indicator" id="chapterCounter">— / —</div>
        <button class="nav-btn" id="nextChapterBtn">Next ▶</button>
    </div>
</div>

<!-- Load JSZip & epub.js from CDN (novelfire style robust reader) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<script>
    (function(){
        // ---------- DOM Elements ----------
        const fileInput = document.getElementById('epubFileInput');
        const uploadLabelBtn = document.getElementById('uploadLabel');
        const fakeUploadBtn = document.getElementById('fakeUploadBtn');
        const renditionRoot = document.getElementById('renditionRoot');
        const emptyStateDiv = document.getElementById('emptyState');
        const navFooter = document.getElementById('navFooter');
        const prevBtn = document.getElementById('prevChapterBtn');
        const nextBtn = document.getElementById('nextChapterBtn');
        const chapterCounter = document.getElementById('chapterCounter');
        const statsPreview = document.getElementById('statsPreview');
        const readerPane = document.getElementById('readerPane');
        const fontSizeControl = document.getElementById('fontSizeControl');
        
        // theme buttons
        const themeOptions = document.querySelectorAll('.theme-option');
        
        // state variables
        let currentBook = null;
        let currentRendition = null;
        let currentTheme = 'light';
        let currentFontSize = '1';
        let spineItemsCount = 0;
        let currentSpineIndex = 0;
        let bookMetadata = { title: 'Unknown', author: '' };
        
        // ---------- Helper Functions ----------
        function updateProgressAndStats(locationCfi) {
            if (!currentBook || !currentBook.locations) {
                statsPreview.innerText = `📖 ${bookMetadata.title}`;
                return;
            }
            currentBook.locations.generate(2000).then(() => {
                let percentage = currentBook.locations.percentage(locationCfi);
                let percentVal = Math.floor(percentage * 100);
                statsPreview.innerText = `${bookMetadata.title} · ${percentVal}%`;
            }).catch(() => {
                statsPreview.innerText = `${bookMetadata.title}`;
            });
        }
        
        async function updateChapterInfo() {
            if (!currentBook || !currentRendition) return;
            try {
                const currentLocation = currentRendition.currentLocation();
                if (currentLocation && currentLocation.start) {
                    const cfi = currentLocation.start.cfi;
                    const spine = await currentBook.spine;
                    const total = spine.length;
                    spineItemsCount = total;
                    // find current index via href
                    const currentHref = currentLocation.start.href;
                    let idx = 0;
                    for (let i = 0; i < spine.length; i++) {
                        const item = spine[i];
                        if (item.href === currentHref) {
                            idx = i;
                            break;
                        }
                    }
                    currentSpineIndex = idx;
                    chapterCounter.innerText = `${idx+1} / ${total}`;
                    // update stats with title
                    const nav = await currentBook.navigation;
                    if (nav && nav.toc && nav.toc[idx]) {
                        let chapTitle = nav.toc[idx].label || `Chapter ${idx+1}`;
                        statsPreview.innerText = `${bookMetadata.title} · ${chapTitle}`;
                    } else {
                        statsPreview.innerText = `${bookMetadata.title} · ${idx+1}/${total}`;
                    }
                    updateProgressAndStats(cfi);
                }
            } catch(e) {
                console.warn("chapter update error", e);
                chapterCounter.innerText = `? / ?`;
            }
        }
        
        // Apply theme to reader pane & rendition
        function applyThemeToReader(theme) {
            currentTheme = theme;
            readerPane.classList.remove('dark', 'sepia', 'light');
            readerPane.classList.add(theme);
            if (currentRendition) {
                // Override themes inside iframe for perfect match (novelfire immersive)
                if (theme === 'dark') {
                    currentRendition.themes.register('novel-dark', `body { background: #1E1C26 !important; color: #E2E0E8 !important; } 
                    a { color: #C9A96E; }`);
                    currentRendition.themes.select('novel-dark');
                } else if (theme === 'sepia') {
                    currentRendition.themes.register('novel-sepia', `body { background: #FCF2E1 !important; color: #4A3729 !important; }`);
                    currentRendition.themes.select('novel-sepia');
                } else {
                    currentRendition.themes.register('novel-light', `body { background: #FFFFFF !important; color: #2C2A2E !important; }`);
                    currentRendition.themes.select('novel-light');
                }
                // re-apply font-size after theme change to preserve
                applyFontSize(currentFontSize);
            }
        }
        
        function applyFontSize(sizeVal) {
            currentFontSize = sizeVal;
            if (!currentRendition) return;
            const remSize = parseFloat(sizeVal) + 'rem';
            currentRendition.themes.register('dynamic-font', `body { font-size: ${remSize} !important; line-height: 1.7; }`);
            currentRendition.themes.select('dynamic-font');
            // Re-apply theme (font override stays but we need theme background again)
            applyThemeToReader(currentTheme);
        }
        
        // Reset UI & destroy old book
        function destroyReader() {
            if (currentRendition) {
                currentRendition.destroy();
                currentRendition = null;
            }
            currentBook = null;
            emptyStateDiv.classList.remove('hidden');
            renditionRoot.innerHTML = '';
            navFooter.style.display = 'none';
            statsPreview.innerText = '📚 No book loaded';
            chapterCounter.innerText = '— / —';
        }
        
        // Load EPUB from arrayBuffer
        async function loadEpubFromBuffer(arrayBuffer, fileName) {
            try {
                if (currentRendition) destroyReader();
                // create book object
                const book = new ePub(arrayBuffer);
                currentBook = book;
                await book.ready;
                
                // get metadata
                const pack = book.packaging;
                const metadata = pack.metadata;
                bookMetadata.title = metadata.title || fileName.replace(/\.epub$/i, '') || "Untitled";
                bookMetadata.author = metadata.creator || "Unknown";
                
                // render to renditionRoot container
                currentRendition = book.renderTo(renditionRoot, {
                    width: "100%",
                    height: "100%",
                    method: "default",
                    manager: "continuous",   // smooth reading experience
                });
                
                // get spine length for nav
                const spine = await book.spine;
                spineItemsCount = spine.length;
                
                // set initial theme & font BEFORE display
                applyThemeToReader(currentTheme);
                applyFontSize(currentFontSize);
                
                // display the book
                await currentRendition.display();
                
                // hide empty state, show footer
                emptyStateDiv.classList.add('hidden');
                navFooter.style.display = 'flex';
                
                // update location & chapter on relocate
                currentRendition.on('relocated', async (location) => {
                    if (location && location.start) {
                        await updateChapterInfo();
                    }
                });
                
                // initial location update
                setTimeout(() => {
                    updateChapterInfo().catch(e=>console.warn(e));
                }, 100);
                
                // also handle errors gracefully
                currentRendition.on('error', (err) => {
                    console.warn("rendition error", err);
                    statsPreview.innerText = "⚠️ Rendering glitch";
                });
                
            } catch (err) {
                console.error("EPUB loading error", err);
                alert("Could not parse EPUB file. Ensure it's a valid, non-DRM EPUB.");
                destroyReader();
            }
        }
        
        // file selection handler
        function handleEpubFile(file) {
            if (!file || !file.name.toLowerCase().endsWith('.epub')) {
                alert("Please select a valid .epub file.");
                return;
            }
            if (!window.JSZip || !window.ePub) {
                alert("Reader engine is initializing. Please wait a moment and try again.");
                return;
            }
            const reader = new FileReader();
            reader.onload = async (e) => {
                const arrayBuffer = e.target.result;
                await loadEpubFromBuffer(arrayBuffer, file.name);
            };
            reader.onerror = () => alert("Failed to read file.");
            reader.readAsArrayBuffer(file);
        }
        
        // Navigation methods
        function nextChapter() {
            if (currentRendition) {
                currentRendition.next().catch(e => console.warn);
            }
        }
        
        function prevChapter() {
            if (currentRendition) {
                currentRendition.prev().catch(e => console.warn);
            }
        }
        
        // ----- Event listeners -----
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleEpubFile(e.target.files[0]);
            fileInput.value = ''; // allow re-upload same file
        });
        
        uploadLabelBtn.addEventListener('click', () => {
            fileInput.click();
        });
        
        if (fakeUploadBtn) {
            fakeUploadBtn.addEventListener('click', () => {
                fileInput.click();
            });
        }
        
        prevBtn.addEventListener('click', prevChapter);
        nextBtn.addEventListener('click', nextChapter);
        
        fontSizeControl.addEventListener('change', (e) => {
            applyFontSize(e.target.value);
        });
        
        // theme switching with active state update
        themeOptions.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.getAttribute('data-theme');
                themeOptions.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyThemeToReader(theme);
            });
        });
        
        // global keyboard shortcuts (like novelfire left/right arrow)
        window.addEventListener('keydown', (e) => {
            if (!currentRendition) return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevChapter();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextChapter();
            }
        });
        
        // check library readiness
        function checkLibsAndNotify() {
            if (window.JSZip && window.ePub) {
                console.log("Libraries ready: NovelFlow Reader active.");
                const emptyMsgDiv = document.querySelector('#emptyState p');
                if (emptyMsgDiv) emptyMsgDiv.innerHTML = `Upload an EPUB file to start reading in a beautiful, distraction-free interface.<br>🎧 Supported: standard EPUB 2/3.`;
            } else {
                setTimeout(checkLibsAndNotify, 200);
            }
        }
        checkLibsAndNotify();
        
        // small initialization style for empty state
        if (renditionRoot) {
            // preload empty state visual
        }
        
        // handle drag & drop? optional but nice (novelfire style)
        const readerPaneDiv = document.getElementById('readerPane');
        readerPaneDiv.addEventListener('dragover', (e) => {
            e.preventDefault();
            readerPaneDiv.style.opacity = '0.95';
        });
        readerPaneDiv.addEventListener('dragleave', () => {
            readerPaneDiv.style.opacity = '1';
        });
        readerPaneDiv.addEventListener('drop', async (e) => {
            e.preventDefault();
            readerPaneDiv.style.opacity = '1';
            const files = e.dataTransfer.files;
            if (files.length && files[0].name.endsWith('.epub')) {
                handleEpubFile(files[0]);
            } else {
                alert("Please drop a valid .epub file.");
            }
        });
        
        // small preload tip
        console.log("NovelFlow Reader — inspired by novelfire.to — ready.");
    })();
</script>
</body>
</html>
